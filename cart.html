<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coșul Tău — Nido Home</title>
<link rel="icon" type="image/svg+xml" href="brand_assets/logo-nido-home.svg">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{cream:'#F3F3EF','warm-taupe':'#D9D4C6','warm-taupe-dk':'#C5BFA8','dark-taupe':'#6C6158','brass':'#C3A848','grey-blue':'#737B7B','dark-wood':'#43221B'},fontFamily:{sans:['system-ui','sans-serif'],serif:['"EB Garamond"','Georgia','serif'],display:['"Playfair Display"','Georgia','serif']}}}}
</script>
<link rel="stylesheet" href="css/product-shared.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-cream/95 backdrop-blur" style="border-bottom:1px solid #D9D4C633">
<div class="max-w-[1440px] mx-auto px-8 lg:px-16 flex items-center h-[68px]">
<a href="index.html" class="shrink-0 no-underline">
<img src="brand_assets/logo-nido-home.svg" alt="NIDO HOME" style="height:48px;width:auto">
</a>
<div class="ml-auto hidden md:flex items-center gap-[28px]">
<a href="index.html" class="nav">Acasă</a>
<a href="index.html#collection" class="nav">Colecții</a>
<a href="index.html#story" class="nav">Povestea Noastră</a>
</div>
</div>
</nav>

<!-- CART SECTION -->
<section class="max-w-[800px] mx-auto px-8 lg:px-16 pt-[88px] pb-24 min-h-[60vh]">
<h1 class="font-display text-[36px] md:text-[48px] text-dark-wood leading-[1.05] mb-10">Coșul Tău</h1>
<div id="cartItems"></div>
<div id="emptyState" class="hidden text-center py-16">
  <p class="font-serif text-[20px] text-dark-taupe/50 mb-6">Coșul tău este gol</p>
  <a href="index.html#collection" class="btn">Descoperă Colecția</a>
</div>
</section>

<!-- FOOTER -->
<footer class="py-14 px-8 lg:px-16" style="background:#43221B">
<div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
  <p class="font-serif text-[11px] text-warm-taupe/20 tracking-[.1em]">© 2026 Nido Home</p>
  <div class="flex gap-6">
    <a href="index.html" class="font-serif text-[13px] text-warm-taupe/30 hover:text-warm-taupe/80 transition-colors no-underline">Acasă</a>
    <a href="vas-sculpted.html" class="font-serif text-[13px] text-warm-taupe/30 hover:text-warm-taupe/80 transition-colors no-underline">Vas Sculpted</a>
  </div>
</div>
</footer>

<script src="js/cart.js"></script>
<script>
function render(){
  const items=getCart(),c=document.getElementById('cartItems'),e=document.getElementById('emptyState');
  if(!items.length){c.innerHTML='';e.classList.remove('hidden');return}
  e.classList.add('hidden');
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  c.innerHTML=`
  <div class="space-y-6 mb-10">
    ${items.map(i=>`
    <div class="flex items-center justify-between py-5 border-b border-warm-taupe/40">
      <div class="flex items-center gap-5">
        <div class="bg-[#E8E4DA] w-20 h-20 flex-shrink-0"></div>
        <div>
          <p class="font-serif text-[18px] text-dark-wood">${i.name}</p>
          <p class="font-serif text-[13px] text-dark-taupe/50">${i.price} RON</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="qty">
          <button onclick="changeItem('${i.id}',${i.qty-1})" class="font-serif">−</button>
          <span class="font-serif text-[15px]">${i.qty}</span>
          <button onclick="changeItem('${i.id}',${i.qty+1})" class="font-serif">+</button>
        </div>
        <button onclick="removeItem('${i.id}')" class="text-dark-taupe/30 hover:text-dark-wood transition-colors text-[13px] font-serif">Elimină</button>
      </div>
    </div>`).join('')}
  </div>
  <div class="flex justify-between items-center py-6 border-t border-warm-taupe/40">
    <p class="font-serif text-[16px] text-dark-wood">Subtotal</p>
    <p class="font-serif text-[22px] text-dark-wood">${total} RON</p>
  </div>
  <p class="font-serif text-[14px] text-dark-taupe/50 mb-6">Livrare gratuită pentru comenzi peste 200 RON</p>
  <a href="index.html#contact" class="btn w-full block text-center">Trimite Comanda</a>`;
}
function changeItem(id,qty){updateQty(id,qty);render()}
function removeItem(id){removeFromCart(id);render()}
render();
</script>
</body>
</html>
